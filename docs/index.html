<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>My Shiny App</title>

  <style>
    /* Fullscreen loader */
    #custom-loader {
      position: fixed;
      inset: 0;
      background: #F2F2F2;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-family: sans-serif;
      z-index: 9999;
    }

    .spinner {
      border: 6px solid #F2F2F2;
      border-top: 6px solid #7B8A8B;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<div id="custom-loader">
  <div class="spinner"></div>
  <p><strong>Initializing VirAliNet...</strong></p>
  <p>Please wait, this initial setup may take a couple of minutes.</p>
</div>

<!-- Shinylive app -->
<div id="root"></div>

<script type="module">
  import { runApp } from "./shinylive.js";

  runApp({
    appDir: "app",
    container: document.getElementById("root"),
  });

  // Remove loader once app is ready
  setTimeout(() => {
    document.getElementById("custom-loader").style.display = "none";
  }, 5000); // adjust timing if needed
</script>

</body>
</html>
