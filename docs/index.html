<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>VirAliNet</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    /* App container must have size */
    #root {
      height: 100vh;
      width: 100%;
    }

    /* Fullscreen loader */
    #custom-loader {
      position: fixed;
      inset: 0;
      background: #F2F2F2;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-family: sans-serif;
      z-index: 9999;
    }

    .spinner {
      border: 6px solid #F2F2F2;
      border-top: 6px solid #7B8A8B;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <!-- Custom loader -->
  <div id="custom-loader">
    <div class="spinner"></div>
    <p><strong>Initializing VirAliNet...</strong></p>
    <p>Please wait, this initial setup may take a couple of minutes.</p>
  </div>

  <!-- Shinylive app -->
  <div id="root"></div>

  <script type="module">
    import { runExportedApp } from "./shinylive/shinylive.js";

    runExportedApp({
      id: "root",
      appEngine: "r",
      relPath: "",
    });

    const loader = document.getElementById("custom-loader");
    const root = document.getElementById("root");

    // Remove loader when app mounts
    const observer = new MutationObserver(() => {
      if (root.children.length > 0) {
        loader.remove();
        observer.disconnect();
      }
    });

    observer.observe(root, {
      childList: true,
      subtree: true
    });

    // Safety fallback (never hang forever)
    setTimeout(() => {
      loader.remove();
    }, 20000);
  </script>

</body>
</html>
